global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 1m

rule_files:
- /etc/prometheus/rules/*.yml


alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - localhost:9093


scrape_configs:

- job_name: prometheus
  static_configs:
  - targets:
    - localhost:9090


- job_name: node_exporter
  static_configs:
  - targets:
    - localhost:9100
